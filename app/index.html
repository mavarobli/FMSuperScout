<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>FMSuperScout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
<header id="topbar">
  <button id="btn-sidebar" title="Filters">☰</button>
  <h1>FM<span>Super</span>Scout</h1>
  <nav>
    <button id="tab-players" class="tab active" data-i18n="players">Spelers</button>
    <button id="tab-staff" class="tab" data-i18n="staff">Staf</button>
    <button id="tab-shortlist" class="tab">★ <span data-i18n="shortlist">Shortlist</span> <span id="sl-count">0</span></button>
  </nav>
  <div id="club-badge" title="Klik = filter op jouw club"></div>
  <div id="dump-info"></div>
  <select id="sel-lang" title="Taal / Language">
    <option value="nl">NL</option>
    <option value="en">EN</option>
  </select>
  <select id="sel-cur" title="Valuta / Currency">
    <option value="£">£ GBP</option>
    <option value="€">€ EUR</option>
  </select>
  <button id="btn-fetch" data-i18n="fetch" title="Vraag FM om een nieuwe dump">⬇ Nieuwe data</button>
  <button id="btn-reload" data-i18n="reload" title="Herlaad de laatste dump">⟳</button>
</header>

<div id="banner" class="hidden"></div>
<div id="main">
  <aside id="filters">
    <div class="fgroup">
      <input type="text" id="f-name" data-i18n-ph="searchph" placeholder="🔍 Zoek naam of club">
    </div>

    <div class="fsection" id="fg-pitch">
      <div class="fsec-head"><span data-i18n="position">Positie</span> <button id="pos-clear" class="mini" data-i18n="clear">wis</button></div>
      <div id="pitch-wrap"></div>
    </div>

    <div class="fgroup" id="fg-staffrole" style="display:none">
      <label data-i18n="staffrole">Staf-rol</label>
      <select id="f-staffrole"><option value="">–</option></select>
    </div>

    <div class="fsection">
      <div class="fsec-head" data-i18n="quality">Kwaliteit &amp; leeftijd</div>
      <div class="frow"><span data-i18n="age">Leeftijd</span><div class="range2"><input type="number" id="f-age-min" placeholder="–">–<input type="number" id="f-age-max" placeholder="–"></div></div>
      <div class="frow"><span>CA</span><div class="range2"><input type="number" id="f-ca-min" placeholder="–">–<input type="number" id="f-ca-max" placeholder="–"></div></div>
      <div class="frow"><span>PA</span><div class="range2"><input type="number" id="f-pa-min" placeholder="–">–<input type="number" id="f-pa-max" placeholder="–"></div></div>
      <div class="frow"><span data-i18n="refyear" title="Huidig in-game jaar — bepaalt de leeftijd">Peiljaar</span><input type="number" id="f-refyear" class="yr"></div>
    </div>

    <div class="fsection">
      <div class="fsec-head" data-i18n="financial">Financieel</div>
      <div class="frow"><span data-i18n="maxvalue">Max. waarde</span><input type="text" id="f-price" placeholder="10M"></div>
      <div class="frow"><span data-i18n="maxwage">Max. loon p/w</span><input type="text" id="f-wage" placeholder="50K"></div>
    </div>

    <div class="fsection">
      <div class="fsec-head" data-i18n="origin">Herkomst</div>
      <div class="frow"><span data-i18n="nat">Nationaliteit</span><input type="text" id="f-nat" placeholder="Nederland"></div>
      <label class="chk"><input type="checkbox" id="f-eu"> <span data-i18n="euonly">Alleen EU/EEA</span></label>
    </div>

    <div class="fsection">
      <div class="fsec-head" data-i18n="availability">Beschikbaarheid</div>
      <div class="frow"><span data-i18n="interestmin">Interesse ≥</span>
        <select id="f-interest">
          <option value="0" data-i18n="all">Alle</option>
          <option value="25" data-i18n="int_small">Klein</option>
          <option value="45" data-i18n="int_ok">Redelijk</option>
          <option value="70" data-i18n="int_big">Groot</option>
        </select></div>
      <label class="chk"><input type="checkbox" id="f-attain"> <span data-i18n="attainable">Haalbaar</span></label>
      <label class="chk"><input type="checkbox" id="f-listed"> <span data-i18n="listed">Op transferlijst</span></label>
      <label class="chk"><input type="checkbox" id="f-exp6"> <span data-i18n="exp6">Contract &lt; 6 mnd</span></label>
      <label class="chk"><input type="checkbox" id="f-exp12"> <span data-i18n="exp12">Contract &lt; 1 jaar</span></label>
      <label class="chk"><input type="checkbox" id="f-free"> <span data-i18n="free">Clubloos</span></label>
      <label class="chk"><input type="checkbox" id="f-myclub"> <span data-i18n="myclub">Mijn club</span></label>
      <label class="chk"><input type="checkbox" id="f-shortlist"> <span data-i18n="onlyshortlist">Alleen shortlist</span></label>
    </div>

    <button id="btn-clear" data-i18n="clearfilters">Filters wissen</button>
    <div id="result-count"></div>
  </aside>

  <section id="content">
    <div id="sl-bar" class="hidden">
      <button id="btn-export" data-i18n="exportcsv">⬇ Shortlist exporteren (CSV)</button>
    </div>
    <div id="table-wrap">
      <table id="grid">
        <thead><tr id="grid-head"></tr></thead>
        <tbody id="grid-body"></tbody>
      </table>
      <div id="grid-spacer"></div>
    </div>
    <div id="empty-state">
      <h2 data-i18n="nodata">Nog geen data geladen</h2>
      <p id="empty-msg"></p>
    </div>
  </section>

  <aside id="detail" class="hidden">
    <button id="detail-close">✕</button>
    <div id="detail-body"></div>
  </aside>
</div>

<div id="toast" class="hidden"></div>
<script src="app.js"></script>
</body>
</html>
