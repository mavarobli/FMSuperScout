<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>FMSuperScout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
<header id="topbar">
  <button id="btn-sidebar" title="Filters tonen/verbergen">☰</button>
  <h1>FM<span>Super</span>Scout</h1>
  <nav>
    <button id="tab-players" class="tab active">Spelers</button>
    <button id="tab-staff" class="tab">Staf</button>
    <button id="tab-shortlist" class="tab">★ Shortlist <span id="sl-count">0</span></button>
  </nav>
  <div id="club-badge" title="Deze data komt uit je draaiende game"></div>
  <div id="dump-info">geen data</div>
  <button id="btn-cur" title="Wissel valuta">£ / €</button>
  <button id="btn-reload" title="Herlaad de nieuwste dump">⟳ Verversen</button>
</header>

<div id="main">
  <aside id="filters">
    <div class="fgroup">
      <input type="text" id="f-name" placeholder="🔍 Zoek naam of club">
    </div>

    <div class="fsection" id="fg-pitch">
      <div class="fsec-head">Positie <button id="pos-clear" class="mini">wis</button></div>
      <div id="pitch-wrap"></div>
    </div>

    <div class="fgroup" id="fg-staffrole" style="display:none">
      <label>Staf-rol</label>
      <select id="f-staffrole"><option value="">Alle rollen</option></select>
    </div>

    <div class="fsection">
      <div class="fsec-head">Kwaliteit &amp; leeftijd</div>
      <div class="frow"><span>Leeftijd</span><div class="range2"><input type="number" id="f-age-min" placeholder="min">–<input type="number" id="f-age-max" placeholder="max"></div></div>
      <div class="frow"><span>CA</span><div class="range2"><input type="number" id="f-ca-min" placeholder="min">–<input type="number" id="f-ca-max" placeholder="max"></div></div>
      <div class="frow"><span>PA</span><div class="range2"><input type="number" id="f-pa-min" placeholder="min">–<input type="number" id="f-pa-max" placeholder="max"></div></div>
    </div>

    <div class="fsection">
      <div class="fsec-head">Financieel</div>
      <div class="frow"><span>Max. waarde</span><input type="text" id="f-price" placeholder="10M"></div>
      <div class="frow"><span>Max. loon p/w</span><input type="text" id="f-wage" placeholder="50K"></div>
    </div>

    <div class="fsection">
      <div class="fsec-head">Herkomst</div>
      <div class="frow"><span>Nationaliteit</span><input type="text" id="f-nat" placeholder="Nederland"></div>
      <label class="chk"><input type="checkbox" id="f-eu"> Alleen EU/EEA</label>
    </div>

    <div class="fsection">
      <div class="fsec-head">Beschikbaarheid</div>
      <div class="frow"><span>Interesse ≥</span>
        <select id="f-interest">
          <option value="0">Alle</option>
          <option value="25">Klein</option>
          <option value="45">Redelijk</option>
          <option value="70">Groot</option>
        </select></div>
      <label class="chk"><input type="checkbox" id="f-attain"> Haalbaar (lijst/vrij/aflopend)</label>
      <label class="chk"><input type="checkbox" id="f-listed"> Op transferlijst</label>
      <label class="chk"><input type="checkbox" id="f-exp6"> Contract &lt; 6 maanden</label>
      <label class="chk"><input type="checkbox" id="f-exp12"> Contract &lt; 1 jaar</label>
      <label class="chk"><input type="checkbox" id="f-free"> Clubloos</label>
      <label class="chk"><input type="checkbox" id="f-myclub"> Bij mijn club</label>
      <label class="chk"><input type="checkbox" id="f-shortlist"> Alleen shortlist</label>
    </div>

    <button id="btn-clear">Filters wissen</button>
    <div id="result-count"></div>
  </aside>

  <section id="content">
    <div id="table-wrap">
      <table id="grid">
        <thead><tr id="grid-head"></tr></thead>
        <tbody id="grid-body"></tbody>
      </table>
      <div id="grid-spacer"></div>
    </div>
    <div id="empty-state">
      <h2>Nog geen data geladen</h2>
      <p id="empty-msg">Start FM26, laad je save en druk op <b>F9</b> om de database te dumpen.<br>Klik daarna op <b>⟳ Verversen</b>.</p>
    </div>
  </section>

  <aside id="detail" class="hidden">
    <button id="detail-close">✕</button>
    <div id="detail-body"></div>
  </aside>
</div>

<script src="app.js"></script>
</body>
</html>
